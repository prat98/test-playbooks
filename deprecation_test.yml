    - name: "Emit deprecation [{{ item.id }}] {{ item.name }} ({{ item.area }})"
      emit_deprecation:
        message: >-
          [{{ item.area | upper }}] {{ item.id }}: '{{ item.name }}' is deprecated
          and will be removed in Ansible {{ '2.19' }}.
          Migrate to a supported alternative before upgrading.
        version: "2.19"
      loop: "{{ deprecated_features }}"
      loop_control:
        label: "{{ item.id }} {{ item.name }}"

