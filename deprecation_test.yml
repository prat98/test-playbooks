---
# Comprehensive Deprecation Test Playbook for Ansible Core 2.16
# This playbook demonstrates deprecation warnings that are captured by AWX/AAP
# as structured events and displayed in the Deprecations Dashboard.
#
# Note: Not all [DEPRECATION WARNING] messages in stdout create "deprecated" events.
# This playbook focuses on patterns that DO create structured events.
# Target: 200+ deprecation messages

- name: Comprehensive Deprecation Test for Core 2.16
  hosts: localhost
  gather_facts: yes
  connection: local

  tasks:
    - name: Display Ansible version
      debug:
        msg: "Running Ansible {{ ansible_version.full }}"

    # =========================================================================
    # CATEGORY 1: Bare String Variables in Conditionals (Individual Tasks)
    # These trigger "Conditional result was of type 'AnsibleUnsafeText'" warnings
    # Scheduled for removal in Ansible 2.19
    # =========================================================================

    - name: Bare conditional - ansible_distribution
      debug:
        msg: "Distribution: {{ ansible_distribution }}"
      when: ansible_distribution

    - name: Bare conditional - ansible_os_family
      debug:
        msg: "OS Family: {{ ansible_os_family }}"
      when: ansible_os_family

    - name: Bare conditional - ansible_hostname
      debug:
        msg: "Hostname: {{ ansible_hostname }}"
      when: ansible_hostname

    - name: Bare conditional - ansible_user_id
      debug:
        msg: "User: {{ ansible_user_id }}"
      when: ansible_user_id

    - name: Bare conditional - ansible_architecture
      debug:
        msg: "Architecture: {{ ansible_architecture }}"
      when: ansible_architecture

    - name: Bare conditional - ansible_python_version
      debug:
        msg: "Python: {{ ansible_python_version }}"
      when: ansible_python_version

    - name: Bare conditional - ansible_system
      debug:
        msg: "System: {{ ansible_system }}"
      when: ansible_system

    - name: Bare conditional - ansible_kernel
      debug:
        msg: "Kernel: {{ ansible_kernel }}"
      when: ansible_kernel

    - name: Bare conditional - ansible_machine
      debug:
        msg: "Machine: {{ ansible_machine }}"
      when: ansible_machine

    - name: Bare conditional - ansible_env.HOME
      debug:
        msg: "Home: {{ ansible_env.HOME }}"
      when: ansible_env.HOME

    - name: Bare conditional - ansible_date_time.date
      debug:
        msg: "Date: {{ ansible_date_time.date }}"
      when: ansible_date_time.date

    - name: Bare conditional - ansible_product_name
      debug:
        msg: "Product: {{ ansible_product_name }}"
      when: ansible_product_name

    - name: Bare conditional - ansible_fqdn
      debug:
        msg: "FQDN: {{ ansible_fqdn }}"
      when: ansible_fqdn

    - name: Bare conditional - ansible_nodename
      debug:
        msg: "Node: {{ ansible_nodename }}"
      when: ansible_nodename

    - name: Bare conditional - ansible_domain
      debug:
        msg: "Domain: {{ ansible_domain }}"
      when: ansible_domain

    - name: Bare conditional - ansible_env.USER
      debug:
        msg: "User dir exists"
      when: ansible_env.USER

    - name: Bare conditional - ansible_kernel_version
      debug:
        msg: "Kernel version: {{ ansible_kernel_version }}"
      when: ansible_kernel_version

    - name: Bare conditional - ansible_distribution_version
      debug:
        msg: "Distro version: {{ ansible_distribution_version }}"
      when: ansible_distribution_version

    - name: Bare conditional - ansible_distribution_release
      debug:
        msg: "Distro release: {{ ansible_distribution_release }}"
      when: ansible_distribution_release

    - name: Bare conditional - ansible_distribution_major_version
      debug:
        msg: "Major version: {{ ansible_distribution_major_version }}"
      when: ansible_distribution_major_version

    - name: Bare conditional - ansible_processor_count
      debug:
        msg: "Processor count: {{ ansible_processor_count }}"
      when: ansible_processor_count

    - name: Bare conditional - ansible_memtotal_mb
      debug:
        msg: "Total memory: {{ ansible_memtotal_mb }} MB"
      when: ansible_memtotal_mb

    - name: Bare conditional - ansible_swaptotal_mb
      debug:
        msg: "Swap total: {{ ansible_swaptotal_mb }} MB"
      when: ansible_swaptotal_mb

    - name: Bare conditional - ansible_virtualization_type
      debug:
        msg: "Virt type: {{ ansible_virtualization_type }}"
      when: ansible_virtualization_type

    - name: Bare conditional - ansible_virtualization_role
      debug:
        msg: "Virt role: {{ ansible_virtualization_role }}"
      when: ansible_virtualization_role

    - name: Bare conditional - ansible_pkg_mgr
      debug:
        msg: "Package manager: {{ ansible_pkg_mgr }}"
      when: ansible_pkg_mgr

    - name: Bare conditional - ansible_service_mgr
      debug:
        msg: "Service manager: {{ ansible_service_mgr }}"
      when: ansible_service_mgr

    - name: Bare conditional - ansible_python.executable
      debug:
        msg: "Python exe: {{ ansible_python.executable }}"
      when: ansible_python.executable

    - name: Bare conditional - ansible_date_time.time
      debug:
        msg: "Time: {{ ansible_date_time.time }}"
      when: ansible_date_time.time

    - name: Bare conditional - ansible_date_time.year
      debug:
        msg: "Year: {{ ansible_date_time.year }}"
      when: ansible_date_time.year

    - name: Bare conditional - ansible_date_time.weekday
      debug:
        msg: "Weekday: {{ ansible_date_time.weekday }}"
      when: ansible_date_time.weekday

    - name: Bare conditional - ansible_date_time.tz
      debug:
        msg: "Timezone: {{ ansible_date_time.tz }}"
      when: ansible_date_time.tz

    - name: Bare conditional - ansible_user_shell
      debug:
        msg: "User shell: {{ ansible_user_shell }}"
      when: ansible_user_shell

    - name: Bare conditional - ansible_user_gecos
      debug:
        msg: "User gecos: {{ ansible_user_gecos }}"
      when: ansible_user_gecos

    - name: Bare conditional - ansible_real_user_id
      debug:
        msg: "Real UID: {{ ansible_real_user_id }}"
      when: ansible_real_user_id

    - name: Bare conditional - ansible_effective_user_id
      debug:
        msg: "Effective UID: {{ ansible_effective_user_id }}"
      when: ansible_effective_user_id

    - name: Bare conditional - ansible_real_group_id
      debug:
        msg: "Real GID: {{ ansible_real_group_id }}"
      when: ansible_real_group_id

    - name: Bare conditional - ansible_effective_group_id
      debug:
        msg: "Effective GID: {{ ansible_effective_group_id }}"
      when: ansible_effective_group_id

    - name: Bare conditional - ansible_selinux.status
      debug:
        msg: "SELinux: {{ ansible_selinux.status }}"
      when: ansible_selinux.status

    - name: Bare conditional - ansible_apparmor.status
      debug:
        msg: "AppArmor: {{ ansible_apparmor.status }}"
      when: ansible_apparmor.status

    # =========================================================================
    # CATEGORY 2: Multiple bare conditionals in single task
    # Each 'and'/'or' clause independently triggers the deprecation
    # =========================================================================

    - name: Multiple bare variables - distribution check
      debug:
        msg: "Multi-check passed"
      when: ansible_distribution and ansible_os_family

    - name: Multiple bare variables - system check
      debug:
        msg: "System check passed"
      when: ansible_system and ansible_kernel

    - name: Multiple bare variables - user check
      debug:
        msg: "User check passed"
      when: ansible_user_id and ansible_user_shell

    - name: Multiple bare variables - architecture check
      debug:
        msg: "Arch check passed"
      when: ansible_architecture and ansible_machine

    - name: Multiple bare variables - version check
      debug:
        msg: "Version check passed"
      when: ansible_distribution_version and ansible_distribution_major_version

    - name: Multiple bare variables - hostname check
      debug:
        msg: "Hostname check passed"
      when: ansible_hostname and ansible_fqdn

    - name: Multiple bare variables - memory check
      debug:
        msg: "Memory check passed"
      when: ansible_memtotal_mb and ansible_swaptotal_mb

    - name: Multiple bare variables - virt check
      debug:
        msg: "Virt check passed"
      when: ansible_virtualization_type and ansible_virtualization_role

    - name: Multiple bare variables - service check
      debug:
        msg: "Service check passed"
      when: ansible_service_mgr and ansible_pkg_mgr

    - name: Multiple bare variables - python check
      debug:
        msg: "Python check passed"
      when: ansible_python_version and ansible_python.executable

    - name: Multiple bare variables - datetime check
      debug:
        msg: "Datetime check passed"
      when: ansible_date_time.date and ansible_date_time.time

    - name: Multiple bare variables - kernel check
      debug:
        msg: "Kernel check passed"
      when: ansible_kernel and ansible_kernel_version

    # =========================================================================
    # CATEGORY 3: Bare conditionals with register
    # =========================================================================

    - name: Register a variable
      command: echo "test"
      register: test_output
      changed_when: false

    - name: Bare conditional on registered variable stdout
      debug:
        msg: "Output exists"
      when: test_output.stdout

    - name: Register another variable
      command: hostname
      register: hostname_output
      changed_when: false

    - name: Bare conditional on registered hostname
      debug:
        msg: "Hostname output: {{ hostname_output.stdout }}"
      when: hostname_output.stdout

    - name: Register uname output
      command: uname -r
      register: uname_output
      changed_when: false

    - name: Bare conditional on registered uname
      debug:
        msg: "Kernel: {{ uname_output.stdout }}"
      when: uname_output.stdout

    - name: Register whoami output
      command: whoami
      register: whoami_output
      changed_when: false

    - name: Bare conditional on registered whoami
      debug:
        msg: "User: {{ whoami_output.stdout }}"
      when: whoami_output.stdout

    # =========================================================================
    # CATEGORY 4: Loop-based deprecations - Batch A (30 iterations)
    # Each loop iteration independently triggers the bare-variable deprecation
    # =========================================================================

    - name: Bare conditional in loop - batch A (30 deprecations)
      debug:
        msg: "Processing batch A item: {{ item }}"
      when: item
      loop:
        - alpha
        - bravo
        - charlie
        - delta
        - echo
        - foxtrot
        - golf
        - hotel
        - india
        - juliet
        - kilo
        - lima
        - mike
        - november
        - oscar
        - papa
        - quebec
        - romeo
        - sierra
        - tango
        - uniform
        - victor
        - whiskey
        - xray
        - yankee
        - zulu
        - apple
        - banana
        - cherry
        - date

    # =========================================================================
    # CATEGORY 5: Loop-based deprecations - Batch B (30 iterations)
    # =========================================================================

    - name: Bare conditional in loop - batch B (30 deprecations)
      debug:
        msg: "Processing batch B item: {{ item }}"
      when: item
      loop:
        - service_nginx
        - service_httpd
        - service_sshd
        - service_firewalld
        - service_chronyd
        - service_rsyslog
        - service_crond
        - service_auditd
        - service_tuned
        - service_postfix
        - service_NetworkManager
        - service_dbus
        - service_systemd
        - service_polkit
        - service_udev
        - service_kernel
        - service_containerd
        - service_docker
        - service_podman
        - service_kubelet
        - service_etcd
        - service_apiserver
        - service_controller
        - service_scheduler
        - service_proxy
        - service_dns
        - service_dhcp
        - service_nfs
        - service_smb
        - service_ldap

    # =========================================================================
    # CATEGORY 6: Loop-based deprecations - Batch C (30 iterations)
    # =========================================================================

    - name: Bare conditional in loop - batch C (30 deprecations)
      debug:
        msg: "Processing batch C item: {{ item }}"
      when: item
      loop:
        - config_network
        - config_storage
        - config_security
        - config_logging
        - config_monitoring
        - config_backup
        - config_cron
        - config_users
        - config_groups
        - config_sudoers
        - config_ssh
        - config_ssl
        - config_firewall
        - config_selinux
        - config_apparmor
        - config_audit
        - config_limits
        - config_sysctl
        - config_grub
        - config_timezone
        - config_locale
        - config_keyboard
        - config_hostname
        - config_dns
        - config_ntp
        - config_proxy
        - config_yum
        - config_apt
        - config_pip
        - config_gem

    # =========================================================================
    # CATEGORY 7: Loop-based deprecations - Batch D (30 iterations)
    # =========================================================================

    - name: Bare conditional in loop - batch D (30 deprecations)
      debug:
        msg: "Processing batch D item: {{ item }}"
      when: item
      loop:
        - host_web01
        - host_web02
        - host_web03
        - host_web04
        - host_web05
        - host_db01
        - host_db02
        - host_db03
        - host_db04
        - host_db05
        - host_app01
        - host_app02
        - host_app03
        - host_app04
        - host_app05
        - host_cache01
        - host_cache02
        - host_cache03
        - host_lb01
        - host_lb02
        - host_mon01
        - host_mon02
        - host_log01
        - host_log02
        - host_bkp01
        - host_bkp02
        - host_dev01
        - host_dev02
        - host_stg01
        - host_stg02

    # =========================================================================
    # CATEGORY 8: Loop-based deprecations - Batch E (30 iterations)
    # =========================================================================

    - name: Bare conditional in loop - batch E (30 deprecations)
      debug:
        msg: "Processing batch E item: {{ item }}"
      when: item
      loop:
        - pkg_ansible
        - pkg_python3
        - pkg_pip3
        - pkg_git
        - pkg_curl
        - pkg_wget
        - pkg_vim
        - pkg_nano
        - pkg_tmux
        - pkg_screen
        - pkg_htop
        - pkg_top
        - pkg_netstat
        - pkg_ss
        - pkg_tcpdump
        - pkg_nmap
        - pkg_rsync
        - pkg_scp
        - pkg_sftp
        - pkg_tar
        - pkg_gzip
        - pkg_bzip2
        - pkg_zip
        - pkg_unzip
        - pkg_make
        - pkg_gcc
        - pkg_g++
        - pkg_cmake
        - pkg_autoconf
        - pkg_automake

    # =========================================================================
    # CATEGORY 9: Loop-based deprecations - Batch F (30 iterations)
    # =========================================================================

    - name: Bare conditional in loop - batch F (30 deprecations)
      debug:
        msg: "Processing batch F item: {{ item }}"
      when: item
      loop:
        - env_production
        - env_staging
        - env_development
        - env_testing
        - env_qa
        - env_uat
        - env_dr
        - env_backup
        - region_us_east_1
        - region_us_west_2
        - region_eu_west_1
        - region_eu_central_1
        - region_ap_south_1
        - region_ap_northeast_1
        - region_ap_southeast_1
        - region_ca_central_1
        - region_sa_east_1
        - region_af_south_1
        - region_me_south_1
        - zone_a
        - zone_b
        - zone_c
        - cluster_prod
        - cluster_dev
        - cluster_staging
        - namespace_default
        - namespace_kube_system
        - namespace_monitoring
        - namespace_logging
        - namespace_ingress

    # =========================================================================
    # CATEGORY 10: Nested ansible facts in bare conditionals
    # =========================================================================

    - name: Bare conditional - ansible_default_ipv4.address
      debug:
        msg: "Default IPv4: {{ ansible_default_ipv4.address | default('N/A') }}"
      when: ansible_default_ipv4.address is defined

    - name: Bare conditional - ansible_default_ipv6.address
      debug:
        msg: "Default IPv6: {{ ansible_default_ipv6.address | default('N/A') }}"
      when: ansible_default_ipv6.address is defined

    - name: Bare conditional - ansible_memfree_mb
      debug:
        msg: "Free memory: {{ ansible_memfree_mb }} MB"
      when: ansible_memfree_mb

    - name: Bare conditional - ansible_swapfree_mb
      debug:
        msg: "Swap free: {{ ansible_swapfree_mb }} MB"
      when: ansible_swapfree_mb

    - name: Bare conditional - ansible_processor_vcpus
      debug:
        msg: "vCPUs: {{ ansible_processor_vcpus }}"
      when: ansible_processor_vcpus

    - name: Bare conditional - ansible_processor_cores
      debug:
        msg: "Cores: {{ ansible_processor_cores }}"
      when: ansible_processor_cores

    - name: Bare conditional - ansible_processor_threads_per_core
      debug:
        msg: "Threads/core: {{ ansible_processor_threads_per_core }}"
      when: ansible_processor_threads_per_core

    - name: Bare conditional - ansible_product_uuid
      debug:
        msg: "Product UUID: {{ ansible_product_uuid | default('N/A') }}"
      when: ansible_product_uuid is defined

    - name: Bare conditional - ansible_bios_version
      debug:
        msg: "BIOS version: {{ ansible_bios_version | default('N/A') }}"
      when: ansible_bios_version is defined

    - name: Bare conditional - ansible_system_vendor
      debug:
        msg: "System vendor: {{ ansible_system_vendor | default('N/A') }}"
      when: ansible_system_vendor is defined

    - name: Bare conditional - ansible_form_factor
      debug:
        msg: "Form factor: {{ ansible_form_factor | default('N/A') }}"
      when: ansible_form_factor is defined

    - name: Bare conditional - ansible_chassis
      debug:
        msg: "Chassis: {{ ansible_chassis | default('N/A') }}"
      when: ansible_chassis is defined

    # =========================================================================
    # CATEGORY 11: set_fact with bare variable comparisons
    # =========================================================================

    - name: Set fact from bare variable
      set_fact:
        my_distro: "{{ ansible_distribution }}"
        my_version: "{{ ansible_distribution_version }}"
        my_arch: "{{ ansible_architecture }}"
        my_kernel: "{{ ansible_kernel }}"
        my_hostname: "{{ ansible_hostname }}"

    - name: Bare conditional on set_fact - distro
      debug:
        msg: "My distro: {{ my_distro }}"
      when: my_distro

    - name: Bare conditional on set_fact - version
      debug:
        msg: "My version: {{ my_version }}"
      when: my_version

    - name: Bare conditional on set_fact - arch
      debug:
        msg: "My arch: {{ my_arch }}"
      when: my_arch

    - name: Bare conditional on set_fact - kernel
      debug:
        msg: "My kernel: {{ my_kernel }}"
      when: my_kernel

    - name: Bare conditional on set_fact - hostname
      debug:
        msg: "My hostname: {{ my_hostname }}"
      when: my_hostname

    # =========================================================================
    # CATEGORY 12: Additional bare conditionals on common vars
    # =========================================================================

    - name: Bare conditional - inventory_hostname
      debug:
        msg: "Inventory hostname: {{ inventory_hostname }}"
      when: inventory_hostname

    - name: Bare conditional - inventory_hostname_short
      debug:
        msg: "Short hostname: {{ inventory_hostname_short }}"
      when: inventory_hostname_short

    - name: Bare conditional - ansible_play_name
      debug:
        msg: "Play name: {{ ansible_play_name }}"
      when: ansible_play_name

    - name: Bare conditional - playbook_dir
      debug:
        msg: "Playbook dir: {{ playbook_dir }}"
      when: playbook_dir

    - name: Bare conditional - role_path
      debug:
        msg: "Role path: {{ role_path | default('not in role') }}"
      when: role_path is defined

    - name: Final summary
      debug:
        msg: |
          Deprecation test complete!
          This playbook generates 200+ 'deprecated' events from:
          - 40+ individual bare conditional tasks
          - 12 bare multi-conditional tasks
          - 4 bare conditional tasks on registered variables
          - 6 loops x 30 iterations = 180 loop-based deprecations
          - 15+ additional fact/set_fact bare conditionals
          Check Administration → Deprecations to view the results.
